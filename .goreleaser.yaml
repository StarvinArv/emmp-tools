# .goreleaser.yaml — Emmp CLI multi-platform release
#
# Builds static FIPS-enabled binaries for linux and darwin.
# Distributed via GitHub Releases with cosign signatures.

version: 2

builds:
  - id: emmp
    dir: cmd/emmp
    binary: emmp
    env:
      - CGO_ENABLED=0
      - GOFIPS140=latest
    ldflags:
      - -s -w -trimpath
      - -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: emmp
    name_template: "emmp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    args:
      - "sign-blob"
      - "--yes"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: checksum

release:
  github:
    owner: emmp-io
    name: emmp-tools
  draft: false
  prerelease: auto
